<button 
  (click)="conmutarTema()" 
  class="fixed bottom-8 left-8 z-50 p-4 rounded-full shadow-2xl transition-all duration-300 hover:scale-110 active:scale-95 cursor-pointer bg-white text-[#d6254d] border border-gray-150 dark:bg-[#3D2E31] dark:text-[#fdeba9] dark:border-[#4B383C]"
  title="Cambiar tema de la pantalla"
  aria-label="Alternar modo oscuro o claro">
  
  <!-- Icono del Sol (Visible en modo oscuro para cambiar a modo claro) -->
  <svg *ngIf="temaService.modoOscuroActivo()" 
       xmlns="http://www.w3.org/2000/svg" 
       fill="none" 
       viewBox="0 0 24 24" 
       stroke-width="2" 
       stroke="currentColor" 
       class="w-6 h-6 animate-pulse">
    <circle cx="12" cy="12" r="5" />
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
  </svg>

  <!-- Icono de la Luna (Visible en modo claro para cambiar a modo oscuro) -->
  <svg *ngIf="!temaService.modoOscuroActivo()" 
       xmlns="http://www.w3.org/2000/svg" 
       fill="none" 
       viewBox="0 0 24 24" 
       stroke-width="2" 
       stroke="currentColor" 
       class="w-6 h-6">
    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
  </svg>
</button>
